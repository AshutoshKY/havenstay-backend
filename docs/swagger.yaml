basePath: /
definitions:
  github_com_user_airbnb-test_api_proto_v1.AddToWishlistRequest:
    properties:
      guest_id:
        type: integer
      property_id:
        type: integer
    type: object
  github_com_user_airbnb-test_api_proto_v1.Booking:
    properties:
      booking_id:
        type: integer
      created_at:
        $ref: '#/definitions/timestamppb.Timestamp'
      end_date:
        description: YYYY-MM-DD
        type: string
      guest_id:
        type: integer
      payment_info:
        type: string
      property_id:
        type: integer
      start_date:
        description: YYYY-MM-DD
        type: string
      status:
        description: e.g., PENDING, CONFIRMED, CANCELLED
        type: string
      updated_at:
        $ref: '#/definitions/timestamppb.Timestamp'
    type: object
  github_com_user_airbnb-test_api_proto_v1.BookingResponse:
    properties:
      booking:
        $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.Booking'
    type: object
  github_com_user_airbnb-test_api_proto_v1.CreateBookingRequest:
    properties:
      end_date:
        type: string
      guest_id:
        type: integer
      payment_info:
        type: string
      property_id:
        type: integer
      start_date:
        type: string
    type: object
  github_com_user_airbnb-test_api_proto_v1.CreateGuestRequest:
    properties:
      country:
        type: string
      email:
        type: string
      name:
        type: string
      phone:
        type: string
    type: object
  github_com_user_airbnb-test_api_proto_v1.CreateHostRequest:
    properties:
      email:
        type: string
      location:
        type: string
      phone:
        type: string
      user_name:
        type: string
    type: object
  github_com_user_airbnb-test_api_proto_v1.CreatePropertyRequest:
    properties:
      description:
        type: string
      host_id:
        type: integer
      location:
        type: string
      name:
        type: string
      price:
        type: integer
    type: object
  github_com_user_airbnb-test_api_proto_v1.GetWishlistResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.WishlistItem'
        type: array
    type: object
  github_com_user_airbnb-test_api_proto_v1.Guest:
    properties:
      booking_ids:
        items:
          type: integer
        type: array
      country:
        type: string
      created_at:
        $ref: '#/definitions/timestamppb.Timestamp'
      email:
        type: string
      guest_id:
        type: integer
      name:
        type: string
      phone:
        type: string
    type: object
  github_com_user_airbnb-test_api_proto_v1.GuestResponse:
    properties:
      guest:
        $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.Guest'
    type: object
  github_com_user_airbnb-test_api_proto_v1.Host:
    properties:
      created_at:
        $ref: '#/definitions/timestamppb.Timestamp'
      email:
        type: string
      id:
        type: integer
      is_verified:
        type: boolean
      location:
        type: string
      phone:
        type: string
      updated_at:
        $ref: '#/definitions/timestamppb.Timestamp'
      user_name:
        type: string
    type: object
  github_com_user_airbnb-test_api_proto_v1.HostResponse:
    properties:
      host:
        $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.Host'
    type: object
  github_com_user_airbnb-test_api_proto_v1.ListBookingsResponse:
    properties:
      bookings:
        items:
          $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.Booking'
        type: array
    type: object
  github_com_user_airbnb-test_api_proto_v1.ListPropertiesResponse:
    properties:
      properties:
        items:
          $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.Property'
        type: array
    type: object
  github_com_user_airbnb-test_api_proto_v1.Property:
    properties:
      created_at:
        $ref: '#/definitions/timestamppb.Timestamp'
      description:
        type: string
      host_id:
        type: integer
      id:
        type: integer
      location:
        type: string
      name:
        type: string
      price:
        type: integer
    type: object
  github_com_user_airbnb-test_api_proto_v1.PropertyResponse:
    properties:
      property:
        $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.Property'
    type: object
  github_com_user_airbnb-test_api_proto_v1.WishlistItem:
    properties:
      created_at:
        $ref: '#/definitions/timestamppb.Timestamp'
      guest_id:
        type: integer
      id:
        type: integer
      property_id:
        type: integer
    type: object
  github_com_user_airbnb-test_api_proto_v1.WishlistResponse:
    properties:
      item:
        $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.WishlistItem'
    type: object
  github_com_user_airbnb-test_internal_pkg_response.HTTPError:
    properties:
      code:
        example: 400
        type: integer
      details:
        example: missing required field 'guestId'
        type: string
      message:
        example: status bad request
        type: string
    type: object
  timestamppb.Timestamp:
    properties:
      nanos:
        description: |-
          Non-negative fractions of a second at nanosecond resolution. This field is
          the nanosecond portion of the duration, not an alternative to seconds.
          Negative second values with fractions must still have non-negative nanos
          values that count forward in time. Must be between 0 and 999,999,999
          inclusive.
        type: integer
      seconds:
        description: |-
          Represents seconds of UTC time since Unix epoch 1970-01-01T00:00:00Z. Must
          be between -315576000000 and 315576000000 inclusive (which corresponds to
          0001-01-01T00:00:00Z to 9999-12-31T23:59:59Z).
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    email: api-support@havenstay.local
    name: HavenStay Platform Support
    url: https://github.com/AshutoshKY/havenstay-backend
  description: "Welcome to the HavenStay Backend API documentation! \U0001F680\n\nHavenStay
    is a modern, high-performance Domain-Driven Design (DDD) backend built in Go.
    It empowers Hosts to manage luxury properties and Guests to seamlessly book remote
    getaways.\n\n### Key Features:\n- **\U0001F3D8️ Property Management**: Full CRUD
    lifecycle for short-term rentals and luxury homes.\n- **\U0001F469‍\U0001F4BC
    Host & Guest Profiles**: Independent onboarding and profile management domains.\n-
    **\U0001F4C5 Booking Engine**: Real-time reservation creation.\n- **❤️ Wishlists**:
    Guests can curate lists of favorite properties.\n\n**Built With**: Go 1.21+, Gin
    (REST), gRPC, Protobufs, MySQL 8, GORM.\n\n\U0001F4E5 **[Download Postman Collection](https://raw.githubusercontent.com/AshutoshKY/havenstay-backend/master/postman_collection.json)**"
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
  termsOfService: https://havenstay.localhost/terms
  title: HavenStay - Hotel & Room Booking API
  version: 1.0.0
paths:
  /v1/bookings:
    get:
      description: Poll the history of all active, past, and cancelled reservations
        tied to a specific Guest profile.
      parameters:
      - description: The ID of the Guest requesting their itinerary.
        in: query
        name: guestId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: An array of all historical and upcoming bookings for the Guest.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.ListBookingsResponse'
        "400":
          description: Bad Request - Missing or invalid guest ID.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
        "500":
          description: Internal Server Error.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
      summary: Get a Guest's Booking History
      tags:
      - Bookings
    post:
      consumes:
      - application/json
      description: |-
        Securely initiates a booking transaction for a specific Property by a Guest.
        The system will evaluate the requested dates, calculate total pricing, and attempt to reserve the asset.
      parameters:
      - description: Payload specifying the Guest ID, Property ID, Start Date, End
          Date, and calculated total price.
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.CreateBookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Reservation successfully created and locked.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.BookingResponse'
        "400":
          description: Validation Bad Request - Overlapping dates or missing required
            fields.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
        "500":
          description: Internal Server Error.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
      summary: Create a Booking Reservation
      tags:
      - Bookings
  /v1/bookings/{id}:
    get:
      description: |-
        Fetch an exact copy of a completed or pending Booking reservation by its unique confirmation ID.
        Typical use-case: Displaying a digital receipt or itinerary details to the Guest.
      parameters:
      - description: The numeric Reservation/Booking ID.
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: The retrieved itinerary and invoice details.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.BookingResponse'
        "400":
          description: Bad Request - Invalid ID format.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
        "404":
          description: Not Found - The reservation does not exist.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
      summary: Retrieve Booking Invoice
      tags:
      - Bookings
  /v1/guests:
    post:
      consumes:
      - application/json
      description: |-
        Creates a new Guest profile. Guests are users who can book properties and create wishlists.
        Ensure the email address provided is unique across the platform.
      parameters:
      - description: Payload containing the Guest's personal details (Name, Email,
          Phone).
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.CreateGuestRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Guest successfully registered and assigned a unique ID.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.GuestResponse'
        "400":
          description: Validation Error - Invalid payload format or duplicate email.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
        "500":
          description: Internal Server Error.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
      summary: Register a new Guest
      tags:
      - Guests
  /v1/guests/{id}:
    get:
      description: Fetches the profile and identity data for a specific Guest by their
        unique numeric identifier.
      parameters:
      - description: The unique numeric ID of the Guest to retrieve.
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: The requested Guest details.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.GuestResponse'
        "400":
          description: Bad Request - The provided ID was invalid.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
        "404":
          description: Not Found - No Guest exists with the provided ID.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
      summary: Retrieve Guest details
      tags:
      - Guests
  /v1/hosts:
    post:
      consumes:
      - application/json
      description: |-
        Creates a new Host profile on the platform. Hosts are independent users capable of listing and managing multiple Properties.
        Note: A newly created host is automatically marked as `is_verified: false` pending administrator approval.
      parameters:
      - description: Payload containing the Host's basic contact and profile information
          (Name, Email, Phone, Location).
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.CreateHostRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Host successfully registered and assigned a unique ID.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.HostResponse'
        "400":
          description: Validation Error - Invalid email format or missing required
            fields.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
        "500":
          description: Internal Server Error - Database connection failure.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
      summary: Register a new Host
      tags:
      - Hosts
  /v1/hosts/{id}:
    get:
      description: |-
        Fetches the complete public profile of a Host by their unique identifier natively from the core system.
        Use this endpoint to display a Host's verification status, contact info, and join date on their public landing page.
      parameters:
      - description: The unique numeric ID of the Host to retrieve.
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: The requested Host details were found and returned successfully.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.HostResponse'
        "400":
          description: Bad Request - The provided ID was not a valid integer.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
        "404":
          description: Not Found - No Host exists with the provided ID.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
      summary: Retrieve Host details
      tags:
      - Hosts
  /v1/lists:
    get:
      description: |-
        Fetches the complete array of bookmarked properties saved under a specific Guest account.
        Acts as the primary data source for the "Saved Homes" UI tab.
      parameters:
      - description: The target Guest's unique Identifier.
        in: query
        name: guestId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: An array wrapping the nested Property details saved by the
            user.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.GetWishlistResponse'
        "400":
          description: Bad Request.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
        "500":
          description: Internal Server Error.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
      summary: View Guest Wishlist
      tags:
      - Wishlists
    post:
      consumes:
      - application/json
      description: |-
        Bookmarks a specific property to a Guest's curated wishlist for later viewing or booking.
        Useful for encouraging users to return to properties they found engaging.
      parameters:
      - description: Payload connecting a Guest ID to a Property ID.
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.AddToWishlistRequest'
      produces:
      - application/json
      responses:
        "201":
          description: A confirmation object encapsulating the newly bookmarked item
            constraint.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.WishlistResponse'
        "400":
          description: Bad Request - Duplicate bookmark or invalid identifiers.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
        "500":
          description: Internal Server Error.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
      summary: Save Property to Wishlist
      tags:
      - Wishlists
  /v1/properties:
    get:
      description: |-
        Retrieve a sweeping list of all active property listings on the HavenStay platform.
        *(Note: In future versions, this will include global pagination and bounding-box map filters).*
      produces:
      - application/json
      responses:
        "200":
          description: A comprehensive array of all available properties.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.ListPropertiesResponse'
        "500":
          description: Internal Server Error while querying the database.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
      summary: Browse all Properties
      tags:
      - Properties
    post:
      consumes:
      - application/json
      description: |-
        An authenticated Host can use this endpoint to publish a new real-estate listing.
        Note: You MUST pass a valid `host_id` representing an already-registered Host on the platform, or the database foreign-key constraint will reject the listing.
      parameters:
      - description: 'The core details of the listing: Name, Description, Location
          String, and Nightly Price (Float).'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.CreatePropertyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Property was published and is now live on the index.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.PropertyResponse'
        "400":
          description: Validation Bad Request - Usually missing Host ID or malformed
            price.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
        "500":
          description: Internal Server Error.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
      summary: List a new Property
      tags:
      - Properties
  /v1/properties/{id}:
    get:
      description: Drill down into a specific property. Returns the exact title, host
        bindings, textual description, nightly price, and location coordinates formatted
        for front-end rendering.
      parameters:
      - description: The exact Property ID to inspect.
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Full property overview returned.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.PropertyResponse'
        "400":
          description: Bad Request.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
        "404":
          description: Property Not Found - the listing may have been deactivated.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
      summary: Get Property Details
      tags:
      - Properties
  /v1/properties/host/{hostId}:
    get:
      description: |-
        Get all properties listed specifically by one Host.
        This endpoint powers the "Host Dashboard", allowing property owners to see all assets they have under management. Optionally, you can pass a `location` query to filter the host's properties by a specific city.
      parameters:
      - description: The Host ID managing these properties.
        in: path
        name: hostId
        required: true
        type: integer
      - description: Optional string to filter the resulting list by a specific city
          or region.
        in: query
        name: location
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: A list of properties bound to the specified host.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.ListPropertiesResponse'
        "400":
          description: Bad Request.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
        "500":
          description: Internal Server Error.
          schema:
            $ref: '#/definitions/github_com_user_airbnb-test_internal_pkg_response.HTTPError'
      summary: Host's Dashboard Properties
      tags:
      - Properties
swagger: "2.0"
