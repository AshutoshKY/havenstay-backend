        type: string
      phone:
        type: string
      updated_at:
        $ref: '#/definitions/timestamppb.Timestamp'
      user_name:
        type: string
    type: object
  github_com_user_airbnb-test_api_proto_v1.HostResponse:
    properties:
      host:
        $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.Host'
    type: object
  github_com_user_airbnb-test_api_proto_v1.ListBookingsResponse:
    properties:
      bookings:
        items:
          $ref: '#/definitions/github_com_user_airbnb-test_api_proto_v1.Booking'
        type: array
    type: object
  github_com_user_airbnb-test_api_proto_v1.ListPropertiesResponse:
