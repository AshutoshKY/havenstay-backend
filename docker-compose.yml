version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: airbnb-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airbnb
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: .
    container_name: airbnb-backend
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=airbnb
      - HTTP_PORT=8080
      - GRPC_PORT=50051
    depends_on:
      - mysql

volumes:
  mysql_data:
